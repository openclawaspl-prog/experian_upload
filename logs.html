<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Experian Dispute — Logs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1e293b;
      border-bottom: 1px solid #2d3f5c;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 16px; font-weight: 700; color: #93c5fd; flex: 1; }

    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    label { font-size: 12px; color: #64748b; }

    input[type="date"], select {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
    }
    input[type="text"] {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
      padding: 5px 10px;
      width: 200px;
    }
    input[type="text"]::placeholder { color: #475569; }

    button.btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button.btn:hover { background: #1d4ed8; }

    /* ── Summary bar ── */
    #summaryBar {
      background: #1a2744;
      padding: 10px 24px;
      display: flex;
      gap: 12px;
      border-bottom: 1px solid #2d3f5c;
      flex-wrap: wrap;
    }
    .pill {
      padding: 3px 12px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
    }
    .pill.success { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .pill.error   { background: #2d0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .pill.skip    { background: #1c1917; color: #a8a29e; border: 1px solid #44403c; }

    /* ── Log table ── */
    #logContainer {
      padding: 16px 24px;
      overflow: auto;
    }

    #logCount {
      font-size: 11px;
      color: #475569;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      text-align: left;
      padding: 6px 10px;
      background: #1e293b;
      color: #64748b;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
    }

    tbody tr { border-bottom: 1px solid #1e293b; }
    tbody tr:hover { background: #1e293b; }

    tbody td {
      padding: 5px 10px;
      vertical-align: top;
      color: #94a3b8;
    }
    td.ts    { color: #475569; white-space: nowrap; font-size: 11px; }
    td.jobId { color: #7dd3fc; font-family: monospace; white-space: nowrap; }
    td.step  { font-weight: 600; white-space: nowrap; }
    td.detail { word-break: break-word; max-width: 600px; }

    /* Step colour coding */
    .step-start    { color: #60a5fa; }
    .step-success  { color: #4ade80; }
    .step-error, .step-failed { color: #f87171; }
    .step-warning  { color: #fbbf24; }
    .step-info     { color: #94a3b8; }

    .empty { color: #334155; text-align: center; padding: 40px; font-size: 14px; }
  </style>
</head>
<body>

  <header>
    <h1>📋 Dispute Logs</h1>
    <div class="controls">
      <label>Date:</label>
      <input type="date" id="datePicker" />

      <label>Filter:</label>
      <input type="text" id="searchInput" placeholder="Search step or detail…" />

      <button class="btn" id="loadBtn">Load</button>
    </div>
  </header>

  <div id="ipBanner" style="background: #1e3a8a; color: #bfdbfe; padding: 12px 24px; font-size: 15px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3f5c;">
    <span>🌐 Current Network IP: <span id="currentIpText" style="color: #fff; font-family: monospace; font-size: 18px; margin-left: 8px;">Loading...</span></span>
    <button class="btn" id="refreshIpBtn" style="background: #2563eb; margin: 0;">↻ Refresh IP</button>
  </div>

  <div id="summaryBar"></div>

  <div id="logContainer">
    <div id="logCount"></div>
    <table id="logTable">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Job ID</th>
          <th>Step</th>
          <th>Detail</th>
        </tr>
      </thead>
      <tbody id="logBody">
        <tr><td colspan="4" class="empty">Select a date and click Load</td></tr>
      </tbody>
    </table>
  </div>

  <script src="logs.js"></script>
</body>
</html>
